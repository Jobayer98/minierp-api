components:
  parameters:

    # ── Path ─────────────────────────────────────────────────────
    PathId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the resource.
      schema:
        $ref: '#/components/schemas/ObjectId'

    # ── Pagination ───────────────────────────────────────────────
    QueryPage:
      name: page
      in: query
      description: Page number (1-based).
      schema:
        type: integer
        default: 1
        minimum: 1
      example: 1

    QueryLimit:
      name: limit
      in: query
      description: Number of items per page.
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
      example: 10

    # ── Sorting ──────────────────────────────────────────────────
    QuerySortBy:
      name: sortBy
      in: query
      description: "Field to sort by. Prefix with `-` for descending (e.g. `-createdAt`)."
      schema:
        type: string
        example: "-createdAt"

    # ── Search ───────────────────────────────────────────────────
    QuerySearch:
      name: search
      in: query
      description: Full-text search term.
      schema:
        type: string
        example: "wireless"
