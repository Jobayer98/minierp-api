paths:
  /roles/permissions:
    get:
      tags: [Roles]
      summary: List available permissions
      description: Returns all valid permission strings grouped by resource. Use this as a reference when assigning permissions to roles.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Permissions grouped by resource.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Available permissions fetched"
                  data:
                    $ref: '#/components/schemas/PermissionsGrouped'
              example:
                success: true
                message: "Available permissions fetched"
                data:
                  product: ["product:read", "product:create", "product:update", "product:delete"]
                  customer: ["customer:read", "customer:create", "customer:update", "customer:delete"]
                  sale: ["sale:read", "sale:create"]
                  dashboard: ["dashboard:read"]
                  role: ["role:manage"]
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/InternalError'

  /roles:
    get:
      tags: [Roles]
      summary: List all roles
      description: Returns all roles with their assigned permissions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of roles.
          content:
            application/json:
              example:
                success: true
                message: "Roles fetched"
                data:
                  - _id: "64f1a2b3c4d5e6f7a8b9c0d1"
                    name: "admin"
                    permissions: ["product:read", "product:create", "product:update", "product:delete", "customer:read", "customer:create", "customer:update", "customer:delete", "sale:read", "sale:create", "dashboard:read", "role:manage"]
                    createdAt: "2024-07-05T08:00:00.000Z"
                    updatedAt: "2024-07-05T08:00:00.000Z"
                  - _id: "64f1a2b3c4d5e6f7a8b9c0d2"
                    name: "manager"
                    permissions: ["product:read", "product:create", "product:update", "customer:read", "customer:create", "customer:update", "sale:read", "sale:create", "dashboard:read"]
                    createdAt: "2024-07-05T08:00:00.000Z"
                    updatedAt: "2024-07-05T08:00:00.000Z"
                  - _id: "64f1a2b3c4d5e6f7a8b9c0d3"
                    name: "employee"
                    permissions: ["product:read", "customer:read", "sale:read", "sale:create", "dashboard:read"]
                    createdAt: "2024-07-05T08:00:00.000Z"
                    updatedAt: "2024-07-05T08:00:00.000Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Roles]
      summary: Create a new role
      description: Creates a custom role with an optional initial set of permissions.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "supervisor"
                permissions:
                  type: array
                  items:
                    type: string
                  example: ["product:read", "sale:read", "dashboard:read"]
            example:
              name: "supervisor"
              permissions: ["product:read", "sale:read", "dashboard:read"]
      responses:
        "201":
          description: Role created.
          content:
            application/json:
              example:
                success: true
                message: "Role created successfully"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d9"
                  name: "supervisor"
                  permissions: ["product:read", "sale:read", "dashboard:read"]
                  createdAt: "2024-07-05T10:00:00.000Z"
                  updatedAt: "2024-07-05T10:00:00.000Z"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/InternalError'

  /roles/{name}:
    get:
      tags: [Roles]
      summary: Get role by name
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Role name (e.g. admin, manager, employee)
          schema:
            type: string
            example: "employee"
      responses:
        "200":
          description: Single role.
          content:
            application/json:
              example:
                success: true
                message: "Role fetched"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d3"
                  name: "employee"
                  permissions: ["product:read", "customer:read", "sale:read", "sale:create", "dashboard:read"]
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T08:00:00.000Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Roles]
      summary: Delete a role
      description: Deletes a custom role. Built-in roles (admin, manager, employee) cannot be deleted.
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            example: "supervisor"
      responses:
        "200":
          description: Role deleted.
          content:
            application/json:
              example:
                success: true
                message: "Role deleted successfully"
        "400":
          description: Attempt to delete a built-in role.
          content:
            application/json:
              example:
                success: false
                message: "Cannot delete built-in role \"admin\""
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

  /roles/{name}/permissions:
    put:
      tags: [Roles]
      summary: Replace all permissions
      description: Replaces the entire permissions array for a role. Use this to do a full reset.
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            example: "employee"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permissions]
              properties:
                permissions:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example: ["product:read", "customer:read", "sale:read", "sale:create", "dashboard:read"]
            example:
              permissions: ["product:read", "customer:read", "sale:read", "sale:create", "dashboard:read"]
      responses:
        "200":
          description: Permissions replaced.
          content:
            application/json:
              example:
                success: true
                message: "Permissions updated"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d3"
                  name: "employee"
                  permissions: ["product:read", "customer:read", "sale:read", "sale:create", "dashboard:read"]
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T11:00:00.000Z"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Roles]
      summary: Add a single permission
      description: Adds one permission to a role without affecting existing permissions.
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            example: "employee"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission]
              properties:
                permission:
                  type: string
                  example: "customer:read"
            example:
              permission: "customer:read"
      responses:
        "200":
          description: Permission added.
          content:
            application/json:
              example:
                success: true
                message: "Permission added"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d3"
                  name: "employee"
                  permissions: ["product:read", "customer:read", "sale:read", "sale:create", "dashboard:read"]
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T11:30:00.000Z"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

  /roles/{name}/permissions/{permission}:
    delete:
      tags: [Roles]
      summary: Remove a single permission
      description: Removes one specific permission from a role.
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            example: "employee"
        - name: permission
          in: path
          required: true
          description: "Permission string to remove (e.g. customer:read)"
          schema:
            type: string
            example: "customer:read"
      responses:
        "200":
          description: Permission removed.
          content:
            application/json:
              example:
                success: true
                message: "Permission removed"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d3"
                  name: "employee"
                  permissions: ["product:read", "sale:read", "sale:create", "dashboard:read"]
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T12:00:00.000Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'
