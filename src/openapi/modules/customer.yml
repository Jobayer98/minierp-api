paths:
  /customers:
    get:
      tags: [Customers]
      summary: List customers
      description: Returns a paginated, searchable list of customers. Admin and Manager only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QuerySearch'
        - $ref: '#/components/parameters/QuerySortBy'
      responses:
        "200":
          description: Paginated customer list.
          content:
            application/json:
              example:
                success: true
                message: "Customers fetched"
                data:
                  - _id: "64f1a2b3c4d5e6f7a8b9c0d2"
                    name: "Acme Corp"
                    phone: "+1-555-0100"
                    email: "contact@acmecorp.com"
                    address: "123 Main St, Springfield, IL 62701"
                    createdAt: "2024-07-05T08:00:00.000Z"
                    updatedAt: "2024-07-05T08:00:00.000Z"
                meta:
                  page: 1
                  limit: 10
                  total: 54
                  totalPages: 6
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Customers]
      summary: Create customer
      description: Creates a new customer. Admin and Manager only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone]
              properties:
                name:
                  type: string
                  example: "Acme Corp"
                phone:
                  type: string
                  example: "+1-555-0100"
                email:
                  type: string
                  format: email
                  example: "contact@acmecorp.com"
                address:
                  type: string
                  example: "123 Main St, Springfield, IL 62701"
      responses:
        "201":
          description: Customer created.
          content:
            application/json:
              example:
                success: true
                message: "Customer created successfully"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d2"
                  name: "Acme Corp"
                  phone: "+1-555-0100"
                  email: "contact@acmecorp.com"
                  address: "123 Main St, Springfield, IL 62701"
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T08:00:00.000Z"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/InternalError'

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get customer by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Single customer.
          content:
            application/json:
              example:
                success: true
                message: "Customer fetched"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d2"
                  name: "Acme Corp"
                  phone: "+1-555-0100"
                  email: "contact@acmecorp.com"
                  address: "123 Main St, Springfield, IL 62701"
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T08:00:00.000Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

    patch:
      tags: [Customers]
      summary: Update customer
      description: Updates customer fields. Admin and Manager only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Acme Corp Ltd"
                phone:
                  type: string
                  example: "+1-555-0199"
                email:
                  type: string
                  format: email
                  example: "info@acmecorp.com"
                address:
                  type: string
                  example: "456 Oak Ave, Springfield, IL 62702"
      responses:
        "200":
          description: Customer updated.
          content:
            application/json:
              example:
                success: true
                message: "Customer updated successfully"
                data:
                  _id: "64f1a2b3c4d5e6f7a8b9c0d2"
                  name: "Acme Corp Ltd"
                  phone: "+1-555-0199"
                  email: "info@acmecorp.com"
                  address: "456 Oak Ave, Springfield, IL 62702"
                  createdAt: "2024-07-05T08:00:00.000Z"
                  updatedAt: "2024-07-05T11:00:00.000Z"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Customers]
      summary: Delete customer
      description: Permanently deletes a customer. Admin only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Customer deleted.
          content:
            application/json:
              example:
                success: true
                message: "Customer deleted successfully"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalError'
